version: "3.8"

services:
  db:
    container_name: logtracker-mysql
    image: mysql:8.0.37

    environment:
      - MYSQL_ROOT_PASSWORD=Root88*
      - MYSQL_DATABASE=logtracker
      - MYSQL_USER=logtracker_be
      - MYSQL_PASSWORD=sujeong88*
      - TZ=Asia/Seoul

    ports:
      - "3308:3306"

    volumes:
      - db_data:/var/lib/mysql

    restart: always

volumes:
  db_data: