<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Dashboard - LogTracker')}"></head>
<body class="bg-light">
<div class="app-shell">
    <aside class="app-sidebar">
        <div class="brand-mark">
            <div class="brand-icon">L</div>
            <div>
                <div class="brand-name">LogTracker</div>
                <div class="brand-caption">AI Observability</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" href="/projects"><span class="sidebar-dot"></span>Dashboard</a>
            <a class="sidebar-link disabled" href="#"><span class="sidebar-dot"></span>Log Analysis</a>
            <a class="sidebar-link disabled" href="#"><span class="sidebar-dot"></span>Issue Detail</a>
        </nav>
    </aside>

    <div class="app-main">
        <header class="app-topbar">
            <h1 class="page-title mb-0">Projects</h1>
        </header>

        <main class="app-content fade-in">
            <div class="metric-grid mb-4">
                <div class="metric-card">
                    <div class="metric-value" th:text="${#lists.size(projects)}">0</div>
                    <div class="metric-label">Projects</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" th:text="${unresolvedCount}">0</div>
                    <div class="metric-label">Unresolved</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" th:text="${resolvedCount}">0</div>
                    <div class="metric-label">Resolved</div>
                </div>
            </div>

            <div class="content-grid dashboard-grid">
                <section class="glass-card">
                    <div class="card-head">
                        <div>
                            <div class="section-title">Projects</div>
                        </div>
                    </div>
                    <div class="card-body-pro scrollable-panel">
                        <form id="projectCreateForm" class="row g-3 mb-4">
                            <div class="col-12">
                                <label class="form-label" for="projectName">프로젝트명</label>
                                <input id="projectName" name="name" type="text" class="form-control" maxlength="100"
                                       placeholder="ex. Commerce API" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="projectDescription">설명 <span class="text-muted small fw-normal">(선택)</span></label>
                                <input id="projectDescription" name="description" type="text" class="form-control" maxlength="500"
                                       placeholder="ex. 결제 서비스 백엔드 로그 트래커">
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button class="btn btn-save" type="submit">프로젝트 생성</button>
                            </div>
                            <p id="projectCreateMessage" class="text-muted small mb-0"></p>
                        </form>

                        <div class="row g-3">
                            <div th:if="${#lists.isEmpty(projects)}" class="col-12">
                                <div class="project-card text-muted">아직 프로젝트가 없습니다.</div>
                            </div>
                            <div th:each="project : ${projects}" class="col-md-6">
                                <a class="project-card d-flex flex-column" th:href="@{/projects/{id}(id=${project.id})}">
                                    <div class="mb-auto">
                                        <div class="section-title" th:text="${project.name}">Commerce API</div>
                                        <div class="text-muted small mt-1"
                                             th:text="${project.description != null && !#strings.isEmpty(project.description) ? project.description : ''}"></div>
                                    </div>
                                    <div class="text-muted small mt-3 text-end">
                                        <span th:text="${project.createdAt}"></span>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </section>

                <aside class="d-grid gap-4">
                    <section class="glass-card">
                        <div class="card-head">
                            <div class="section-title">Statistics</div>
                        </div>
                        <div class="card-body-pro">
                            <div class="d-flex justify-content-around gap-3 flex-wrap">
                                <div class="text-center">
                                    <div style="position:relative;display:inline-block;">
                                        <svg id="statusDonut" viewBox="0 0 100 100" width="130" height="130"></svg>
                                        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
                                            <div class="section-title" id="statusTotal">0</div>
                                            <div class="text-muted" style="font-size:.7rem">Issues</div>
                                        </div>
                                    </div>
                                    <div class="d-flex flex-column gap-1 mt-2 align-items-center" style="font-size:.82rem;">
                                        <span><span style="color:#ef4444;margin-right:.3rem;">●</span>Unresolved <span id="legendUnresolved" class="text-muted ms-1">0</span></span>
                                        <span><span style="color:#22c55e;margin-right:.3rem;">●</span>Resolved <span id="legendResolved" class="text-muted ms-1">0</span></span>
                                    </div>
                                </div>

                                <div class="text-center">
                                    <div style="position:relative;display:inline-block;">
                                        <svg id="severityDonut" viewBox="0 0 100 100" width="130" height="130"></svg>
                                        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
                                            <div class="section-title" id="severityTotal">0</div>
                                            <div class="text-muted" style="font-size:.7rem">Analyzed</div>
                                        </div>
                                    </div>
                                    <div class="d-flex flex-column gap-1 mt-2 align-items-center" style="font-size:.82rem;">
                                        <span><span style="color:#ef4444;margin-right:.3rem;">●</span>HIGH <span id="legendHigh" class="text-muted ms-1">0</span></span>
                                        <span><span style="color:#fbbf24;margin-right:.3rem;">●</span>MEDIUM <span id="legendMedium" class="text-muted ms-1">0</span></span>
                                        <span><span style="color:#22c55e;margin-right:.3rem;">●</span>LOW <span id="legendLow" class="text-muted ms-1">0</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </aside>
            </div>
        </main>
    </div>
</div>

<script th:inline="javascript">
    const STATS = {
        unresolved: [[${unresolvedCount}]],
        resolved:   [[${resolvedCount}]],
        high:       [[${severityCounts['HIGH']}]],
        medium:     [[${severityCounts['MEDIUM']}]],
        low:        [[${severityCounts['LOW']}]]
    };

    function drawDonut(svgId, segments, totalId) {
        const svg = document.getElementById(svgId);
        const NS = 'http://www.w3.org/2000/svg';
        const r = 38, cx = 50, cy = 50;
        const C = 2 * Math.PI * r;
        const total = segments.reduce((s, x) => s + x.count, 0);

        document.getElementById(totalId).textContent = total;

        const bg = document.createElementNS(NS, 'circle');
        bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); bg.setAttribute('r', r);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(148,163,184,.12)');
        bg.setAttribute('stroke-width', '12');
        svg.appendChild(bg);

        if (total === 0) return;

        let offset = 0;
        for (const seg of segments) {
            if (seg.count === 0) continue;
            const len = (seg.count / total) * C;
            const circle = document.createElementNS(NS, 'circle');
            circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
            circle.setAttribute('fill', 'none');
            circle.setAttribute('stroke', seg.color);
            circle.setAttribute('stroke-width', '12');
            circle.setAttribute('stroke-dasharray', `${len} ${C - len}`);
            circle.setAttribute('stroke-dashoffset', -offset);
            circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
            svg.appendChild(circle);
            offset += len;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('legendUnresolved').textContent = STATS.unresolved;
        document.getElementById('legendResolved').textContent   = STATS.resolved;
        document.getElementById('legendHigh').textContent       = STATS.high;
        document.getElementById('legendMedium').textContent     = STATS.medium;
        document.getElementById('legendLow').textContent        = STATS.low;

        drawDonut('statusDonut', [
            { count: STATS.unresolved, color: '#ef4444' },
            { count: STATS.resolved,   color: '#22c55e' }
        ], 'statusTotal');

        drawDonut('severityDonut', [
            { count: STATS.high,   color: '#ef4444' },
            { count: STATS.medium, color: '#fbbf24' },
            { count: STATS.low,    color: '#22c55e' }
        ], 'severityTotal');
    });

    const projectCreateForm = document.getElementById('projectCreateForm');
    const projectCreateMessage = document.getElementById('projectCreateMessage');

    projectCreateForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('projectName').value.trim();
        const description = document.getElementById('projectDescription').value.trim() || null;

        if (!name) {
            projectCreateMessage.textContent = '프로젝트명을 입력해 주세요.';
            return;
        }

        const response = await fetch('/api/projects', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, description})
        });

        if (response.ok) {
            window.location.reload();
            return;
        }
        projectCreateMessage.textContent = '프로젝트 생성에 실패했습니다.';
    });
</script>
</body>
</html>
